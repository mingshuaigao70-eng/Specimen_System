<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>登录 - 电子标本馆</title>
    <style>
        body {
            font-family: "微软雅黑", sans-serif;
            margin: 0;
            background: #f5f5f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .login-container {
            background: white;
            padding: 40px 50px;
            border-radius: 10px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.2);
            width: 350px;
            text-align: center;
        }

        .login-container h1 {
            margin-bottom: 30px;
            color: #2c3e50;
        }

        .login-container form {
            display: flex;
            flex-direction: column;
        }

        .login-container input[type="text"],
        .login-container input[type="password"] {
            padding: 10px 15px;
            margin-bottom: 15px;
            border-radius: 5px;
            border: 1px solid #ccc;
            font-size: 14px;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .login-container input:focus {
            border-color: #1abc9c;
            box-shadow: 0 0 5px rgba(26, 188, 156, 0.5);
            outline: none;
        }

        .captcha-container {
            display: flex;
            align-items: center;
            margin-bottom: 10px;
        }
        .captcha-container img {
            margin-left: 10px;
            cursor: pointer;
            height: 40px;
            border-radius: 5px;
            border: 1px solid #ccc;
        }

        .login-container button {
            padding: 12px 15px;
            background: #1abc9c;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.3s, transform 0.2s;
        }

        .login-container button:hover {
            background: #16a085;
            transform: translateY(-2px);
        }

        .flash-message {
            color: red;
            margin-bottom: 15px;
            font-size: 14px;
        }

        .login-footer {
            margin-top: 20px;
            font-size: 12px;
            color: #999;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <h1>电子标本馆登录</h1>

        {% with messages = get_flashed_messages() %}
            {% if messages %}
                {% for message in messages %}
                    <div class="flash-message">{{ message }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form method="POST" action="{{ url_for('auth.login') }}">
            <input type="text" name="username" placeholder="用户名" required>
            <input type="password" name="password" placeholder="密码" required>

            <div class="captcha-container">
                <input type="text" name="captcha" placeholder="验证码" required style="flex:1; padding:10px; border-radius:5px; border:1px solid #ccc;">
                <img src="{{ url_for('auth.captcha') }}" onclick="this.src='{{ url_for('auth.captcha') }}?'+Math.random()" alt="验证码">
            </div>
            <small style="color:#666; margin-bottom:15px;">点击图片刷新验证码</small>

            <button type="submit">登录</button>
        </form>

        <div class="login-footer">
            © 2026 电子标本馆
        </div>
    </div>
</body>
</html>
