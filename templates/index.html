<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>电子标本馆</title>
    <style>
        body { font-family: "微软雅黑", sans-serif; margin: 0; background: #f5f5f5; }
        header {
            position: fixed;
            top: 0; left: 0; right: 0;
            background: #2c3e50;
            color: white;
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 10;
        }
        header a { color: white; text-decoration: none; margin-left: 15px; font-weight: 500; }
        header a:hover { text-decoration: underline; }
        main { padding: 100px 30px 30px 30px; }
        .specimen-list { display: flex; flex-wrap: wrap; gap: 20px; justify-content: center; }
        .specimen-item {
            background: white;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            overflow: hidden;
            width: 220px;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .specimen-item:hover { transform: translateY(-5px); box-shadow: 0 6px 16px rgba(0,0,0,0.2); }
        .specimen-item img { width: 100%; height: 150px; object-fit: cover; display: block; }
        .specimen-item h3 { margin: 10px; font-size: 1.1em; color: #333; }
        .specimen-item p { margin: 0 10px 10px 10px; font-size: 0.9em; color: #666; }
    </style>
</head>
<body>
    <header>
        <div>欢迎来到电子标本馆, {{ current_user.username }}</div>
        <div>
            {% if current_user.is_admin %}
                <a href="{{ url_for('admin.dashboard') }}">配置平台</a>
            {% endif %}
            <a href="{{ url_for('auth.logout') }}">退出登录</a>
        </div>
    </header>

    <main>
        <h1>展览馆首页</h1>

        {% if specimens %}
            <div class="specimen-list">
                {% for s in specimens %}
                    <div class="specimen-item">
                        {% if s.image_path %}
                            <img src="{{ url_for('static', filename='images/' + s.image_path) }}" alt="{{ s.name }}">
                        {% else %}
                            <div style="height:150px;background:#eee;display:flex;justify-content:center;align-items:center;">无图片</div>
                        {% endif %}
                        <h3>{{ s.name }}</h3>
                        <p>{{ s.scientific_name }}</p>
                    </div>
                {% endfor %}
            </div>
        {% else %}
            <p>目前没有标本数据，敬请期待。</p>
        {% endif %}
    </main>
</body>
</html>
