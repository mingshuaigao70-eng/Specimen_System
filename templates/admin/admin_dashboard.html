<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>后台管理平台</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<style>
body{margin:0;font-family:"微软雅黑",sans-serif;background:#f5f6fa;}
header{height:60px;background:#34495e;color:white;display:flex;align-items:center;justify-content:space-between;padding:0 30px;}
header a{color:white;text-decoration:none;margin-left:20px;}
.main-layout{display:flex;height:calc(100vh - 60px);}
.sidebar{width:210px;background:#2c3e50;color:white;padding-top:20px;flex-shrink:0;}
.sidebar a{display:block;padding:10px 20px;color:white;text-decoration:none;}
.sidebar a:hover{background:#34495e;}
.sidebar a.active{background:#1abc9c;}
.main-content{flex:1;display:flex;flex-direction:column;}
.subnav{background:#ecf0f1;padding:10px 15px;border-bottom:1px solid #ddd;display:none;}
.subnav a{margin-right:10px;padding:6px 12px;border-radius:4px;text-decoration:none;color:#333;}
.subnav a.active{background:#1abc9c;color:white;}
.content-frame{flex:1;}
iframe{width:100%;height:100%;border:none;}
</style>
</head>

<body>
<header>
    <div>后台管理平台</div>
    <div>
        <a href="{{ url_for('main.index') }}">返回前台</a>
        <a href="{{ url_for('auth.logout') }}">退出登录</a>
    </div>
</header>

<div class="main-layout">

<!-- 左侧导航 -->
<div class="sidebar">
{% if current_user.role == 'superadmin' %}
<a href="javascript:void(0);" id="menu_users"
onclick="switchModule('users','{{ url_for('admin.manage_users') }}',this)">
用户管理
</a>
{% endif %}

{% if current_user.role in ['superadmin','admin'] %}
<a href="javascript:void(0);" id="menu_specimen"
onclick="switchModule('specimen','{{ url_for('admin.list_categories') }}',this)">
标本管理
</a>

<a href="javascript:void(0);" id="menu_upload"
onclick="switchModule('upload','{{ url_for('admin.upload_specimen') }}',this)">
上传标本
</a>
{% endif %}
</div>

<!-- 主体区域 -->
<div class="main-content">

<!-- 二级导航 -->
<div id="specimen_subnav" class="subnav">
<a href="javascript:void(0);" class="active"
onclick="loadSubPage('{{ url_for('admin.list_categories') }}',this)">
标本大类管理
</a>
<a href="javascript:void(0);"
onclick="loadSubPage('{{ url_for('admin.manage_specimens') }}',this)">
标本信息维护
</a>
</div>

<!-- iframe -->
<div class="content-frame">
<iframe id="content_frame"></iframe>
</div>

</div>
</div>

<script>
// 切换二级页面
function loadSubPage(url,element){
    document.getElementById("content_frame").src=url;
    let links=element.parentNode.querySelectorAll("a");
    links.forEach(a=>a.classList.remove("active"));
    element.classList.add("active");
}

// 一级菜单切换
function switchModule(module,url,element){
    document.getElementById("content_frame").src=url;

    document.querySelectorAll(".subnav").forEach(div=>{
        div.style.display="none";
    });

    if(module==="specimen"){
        document.getElementById("specimen_subnav").style.display="block";
    }

    document.querySelectorAll(".sidebar a").forEach(a=>{
        a.classList.remove("active");
    });
    element.classList.add("active");
}

// 默认打开页面
window.onload=function(){
{% if current_user.role == 'superadmin' %}
switchModule('users','{{ url_for("admin.manage_users") }}',document.getElementById("menu_users"));
{% else %}
switchModule('specimen','{{ url_for("admin.list_categories") }}',document.getElementById("menu_specimen"));
{% endif %}
}
</script>

</body>
</html>
