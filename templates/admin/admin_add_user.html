<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>新增用户</title>
    <style>
        body { font-family:"微软雅黑", sans-serif; margin:0; background:#f5f5f5; }
        .form-container { max-width:400px; margin:50px auto; padding:20px; background:#fff; border-radius:8px; box-shadow:0 2px 8px rgba(0,0,0,0.1);}
        label { display:block; margin-top:10px; }
        input, select { width:100%; padding:8px; margin-top:5px; border-radius:4px; border:1px solid #ccc; }
        button { margin-top:15px; padding:10px 15px; border:none; border-radius:4px; background:#27ae60; color:#fff; cursor:pointer; }
        button:hover { background:#1e8449; }
    </style>
</head>
<body>
<div class="form-container">
    <h2>新增用户</h2>
    <form method="post">
        <label>用户名</label>
        <input type="text" name="username" required>
        <label>密码</label>
        <input type="password" name="password" required>
        <label>角色</label>
        <select name="role">
            <option value="superadmin">超级管理员</option>
            <option value="admin">管理员</option>
            <option value="user" selected>普通用户</option>
        </select>
        <button type="submit">新增用户</button>
    </form>
</div>
</body>
</html>
