<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>标本大类管理</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<style>
    .table td, .table th { text-align: center; vertical-align: middle; }
    .btn { min-width: 80px; }
    .form-inline { display: flex; gap: 10px; align-items: center; margin-bottom: 20px; }
</style>
</head>
<body class="p-4">
<div class="container">
    <h2 class="mb-4">标本大类管理</h2>

    <!-- 新增大类表单 -->
    <form action="{{ url_for('admin.add_category') }}" method="post" class="form-inline mb-4">
        <input type="text" name="name" class="form-control" placeholder="请输入大类名称" required>
        <input type="text" name="description" class="form-control" placeholder="说明（可选）">
        <button type="submit" class="btn btn-primary">添加</button>
    </form>

    <!-- 大类列表 -->
    <table class="table table-striped table-bordered">
        <thead class="table-light">
            <tr>
                <th>序号</th>
                <th>名称</th>
                <th>说明</th>
                <th>创建人</th>
                <th>修改人</th>
                <th>创建时间</th>
                <th>修改时间</th>
                <th>操作</th>
            </tr>
        </thead>
        <tbody>
        {% for cat in categories %}
            <tr>
                <td>{{ loop.index }}</td>
                <td>{{ cat.name }}</td>
                <td>{{ cat.description or '-' }}</td>
                <td>{{ cat.created_by or '-' }}</td>
                <td>{{ cat.updated_by or '-' }}</td>
                <td>{{ cat.created_at.strftime('%Y-%m-%d %H:%M') }}</td>
                <td>{{ cat.updated_at.strftime('%Y-%m-%d %H:%M') }}</td>
                <td>
                    <!-- 编辑按钮，触发模态框 -->
                    <button type="button" class="btn btn-sm btn-warning" data-bs-toggle="modal" data-bs-target="#editModal{{ cat.id }}">
                        编辑
                    </button>
                    <!-- 删除表单 -->
                    <form action="{{ url_for('admin.delete_category', id=cat.id) }}" method="post" style="display:inline-block;" onsubmit="return confirm('确认删除此大类吗？');">
                        <button type="submit" class="btn btn-sm btn-danger">删除</button>
                    </form>
                </td>
            </tr>

            <!-- 编辑模态框 -->
            <div class="modal fade" id="editModal{{ cat.id }}" tabindex="-1" aria-labelledby="editModalLabel{{ cat.id }}" aria-hidden="true">
                <div class="modal-dialog">
                    <form action="{{ url_for('admin.edit_category', id=cat.id) }}" method="post">
                        <div class="modal-content">
                            <div class="modal-header">
                                <h5 class="modal-title" id="editModalLabel{{ cat.id }}">编辑大类</h5>
                                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="关闭"></button>
                            </div>
                            <div class="modal-body">
                                <div class="mb-3">
                                    <label class="form-label">名称</label>
                                    <input type="text" name="name" class="form-control" value="{{ cat.name }}" required>
                                </div>
                                <div class="mb-3">
                                    <label class="form-label">说明</label>
                                    <input type="text" name="description" class="form-control" value="{{ cat.description }}">
                                </div>
                                <div class="mb-3">
                                    <label class="form-label">修改人</label>
                                    <input type="text" name="updated_by" class="form-control" value="{{ current_user.username }}" readonly>
                                </div>
                            </div>
                            <div class="modal-footer">
                                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                                <button type="submit" class="btn btn-primary">保存修改</button>
                            </div>
                        </div>
                    </form>
                </div>
            </div>

        {% endfor %}
        </tbody>
    </table>
</div>
</body>
</html>
