<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>标本管理</title>
<style>
table { width:100%; border-collapse: collapse; }
th, td { padding: 8px; border: 1px solid #ddd; text-align: left; }
th { background: #f5f5f5; }
tr:hover { background: #f1f1f1; }
</style>
</head>
<body>
<h2>标本管理</h2>
<table>
<tr><th>ID</th><th>名称</th><th>分类</th></tr>
{% for specimen in specimens %}
<tr>
<td>{{ specimen.id }}</td>
<td>{{ specimen.name }}</td>
<td>{{ specimen.category }}</td>
</tr>
{% endfor %}
</table>
</body>
</html>
