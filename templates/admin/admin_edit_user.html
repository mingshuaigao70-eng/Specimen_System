<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>编辑用户</title>
    <style>
        body { font-family:"微软雅黑", sans-serif; margin:0; background:#f5f5f5; }
        .form-container { max-width:400px; margin:50px auto; padding:20px; background:#fff; border-radius:8px; box-shadow:0 2px 8px rgba(0,0,0,0.1);}
        label { display:block; margin-top:10px; }
        input, select { width:100%; padding:8px; margin-top:5px; border-radius:4px; border:1px solid #ccc; }
        button { margin-top:15px; padding:10px 15px; border:none; border-radius:4px; background:#3498db; color:#fff; cursor:pointer; }
        button:hover { background:#2980b9; }
    </style>
</head>
<body>
<div class="form-container">
    <h2>编辑用户</h2>
    <form method="post">
        <label>用户名</label>
        <input type="text" name="username" value="{{ user.username }}" required>
        <label>角色</label>
        <select name="role">
            <option value="superadmin" {% if user.role=='superadmin' %}selected{% endif %}>超级管理员</option>
            <option value="admin" {% if user.role=='admin' %}selected{% endif %}>管理员</option>
            <option value="user" {% if user.role=='user' %}selected{% endif %}>普通用户</option>
        </select>
        <button type="submit">保存修改</button>
    </form>
</div>
</body>
</html>
